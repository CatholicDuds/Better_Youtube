name: Publicar no GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: "23 * * * *"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

env:
  PAGES_ARTIFACT_NAME: github-pages-${{ github.run_id }}-${{ github.run_attempt }}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Instalar extrator de legendas
        run: |
          python -m pip install --disable-pip-version-check yt-dlp
          sudo apt-get update
          sudo apt-get install -y ffmpeg
      - run: pnpm install --frozen-lockfile
      - name: Atualizar vídeos dos canais selecionados
        run: node scripts/update-videos.mjs
      - name: Descobrir vídeos por assuntos
        run: node scripts/discover-videos.mjs
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          DISCOVERY_BATCH_SIZE: 4
      - name: Atualizar notícias da semana
        run: node scripts/update-news.mjs
      - name: Atualizar capas do Apple Podcasts
        run: node scripts/update-podcasts.mjs
      - name: Recuperar auditorias anteriores
        uses: actions/cache/restore@v4
        with:
          path: public/data/content-audits.json
          key: content-audits-${{ github.run_id }}
          restore-keys: content-audits-
      - name: Auditar conteúdo de vídeos, notícias e podcasts
        if: github.event_name != 'push'
        run: |
          utc_hour=$(date -u +%H)
          if [ "$GITHUB_EVENT_NAME" = "schedule" ] && [ $((10#$utc_hour % 2)) -ne 0 ]; then
            echo "Auditoria aguardará a próxima janela de 2 horas."
          else
            if [ "$GITHUB_EVENT_NAME" = "schedule" ] && [ $((10#$utc_hour % 8)) -ne 0 ]; then
              export PODCAST_AUDIT_BATCH_SIZE=0
            fi
            node scripts/audit-content.mjs
          fi
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GROQ_EVALUATION_MODEL: openai/gpt-oss-20b
          GROQ_TRANSCRIPTION_MODEL: whisper-large-v3-turbo
          GROQ_AUDIT_INTERVAL_MS: 75000
          CONTENT_AUDIT_BATCH_SIZE: 1
          PODCAST_AUDIT_BATCH_SIZE: 1
      - name: Preservar auditorias para a próxima execução
        uses: actions/cache/save@v4
        with:
          path: public/data/content-audits.json
          key: content-audits-${{ github.run_id }}
      - name: Gerar site estático
        run: npm run build:pages
        env:
          NEXT_PUBLIC_BASE_PATH: /${{ github.event.repository.name }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ vars.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY }}
      - uses: actions/configure-pages@v5
      - name: Enviar artefato do site
        uses: actions/upload-pages-artifact@v4
        with:
          name: ${{ env.PAGES_ARTIFACT_NAME }}
          path: out
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Publicar
        id: deployment
        uses: actions/deploy-pages@v5
        with:
          artifact_name: ${{ env.PAGES_ARTIFACT_NAME }}
